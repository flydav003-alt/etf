name: 每日ETF持股抓取

on:
  schedule:
    - cron: '10 9 * * 1-5'   # 台灣時間 17:10（UTC 09:10）週一到週五
  workflow_dispatch:
    inputs:
      target_date:
        description: '指定日期 (YYYY-MM-DD)，留空則為今日'
        required: false
        default: ''

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. 取出 repo ──────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python 環境 ────────────────────────────────────
      - name: 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. 安裝 Python 套件 ───────────────────────────────
      #   nest_asyncio：fetch_holdings.py 在某些執行環境需要
      #   beautifulsoup4：NAV/規模網頁解析用
      #   playwright：Playwright 瀏覽器控制（抓 NAV/規模/折溢價）
      - name: 安裝 Python 套件
        run: |
          pip install --upgrade pip --quiet
          pip install requests pandas beautifulsoup4 nest_asyncio playwright --quiet

      # ── 4. 安裝 Playwright 瀏覽器 ────────────────────────
      #   --with-deps 會同時裝 Chromium 本體 + Linux 系統相依套件
      #   等同於舊寫法的 install chromium + install-deps chromium
      - name: 安裝 Playwright Chromium
        run: python -m playwright install --with-deps chromium

      # ── 5. 執行抓取 ───────────────────────────────────────
      #   PLAYWRIGHT_BROWSERS_PATH：確保 chromium 路徑正確
      #   PYTHONUNBUFFERED：讓 log 即時輸出，方便 Actions 頁面即時查看
      - name: 執行抓取程式
        env:
          PYTHONUNBUFFERED: "1"
          PLAYWRIGHT_BROWSERS_PATH: "0"
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            python fetch_holdings.py "${{ github.event.inputs.target_date }}"
          else
            python fetch_holdings.py
          fi

      # ── 6. Commit 更新資料回 repo ─────────────────────────
      #   git diff --staged --quiet：若沒有任何變化（例如非交易日）就不 commit
      - name: Commit 更新資料
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add etf_tracker.db data/ etf_tracker.log
          git diff --staged --quiet || git commit -m "📊 自動更新 ETF 持股 $(date +'%Y-%m-%d')"
          git push
