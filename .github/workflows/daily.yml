name: 每日ETF持股抓取

on:
  schedule:
    - cron: '10 9 * * 1-5'   # 台灣時間 17:10（UTC 09:10）週一到週五
  workflow_dispatch:
    inputs:
      target_date:
        description: '指定日期 (YYYY-MM-DD)，留空則為今日'
        required: false
        default: ''

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝 Python 套件
        run: pip install requests pandas playwright beautifulsoup4 --quiet

      - name: 安裝 Playwright Chromium（NAV/規模抓取用）
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: 執行抓取程式
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            python fetch_holdings.py "${{ github.event.inputs.target_date }}"
          else
            python fetch_holdings.py
          fi

      - name: Commit 更新資料
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add etf_tracker.db data/ etf_tracker.log
          git diff --staged --quiet || git commit -m "📊 自動更新 ETF 持股 $(date +'%Y-%m-%d')"
          git push
